<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Админ — К Студия</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f1ee;color:#1a1a1a;min-height:100vh}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.10)}
.login-logo{font-size:1.8rem;font-weight:700;letter-spacing:.12em;margin-bottom:.3rem}
.login-logo span{color:#c9a96e}
.login-sub{color:#999;font-size:.875rem;margin-bottom:2rem}
.login-card input{width:100%;padding:.8rem 1rem;border:1.5px solid #e0dbd3;border-radius:10px;font-size:1rem;margin-bottom:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.login-card input:focus{border-color:#c9a96e}
.login-card .btn-login{width:100%;padding:.9rem;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:.03em;transition:opacity .2s}
.login-card .btn-login:hover{opacity:.85}
.login-err{color:#e53e3e;font-size:.83rem;margin-top:.5rem;display:none}
.adm-header{background:#1a1a1a;color:#fff;padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.adm-logo{font-size:1rem;font-weight:700;letter-spacing:.06em}
.adm-logo span{color:#c9a96e}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);padding:.38rem .9rem;border-radius:7px;cursor:pointer;font-size:.82rem;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.08);color:#fff}
.tabs-bar{background:#fff;border-bottom:1.5px solid #e8e2db;padding:0 1.5rem;display:flex;gap:0;position:sticky;top:58px;z-index:99;overflow-x:auto}
.tab-btn{padding:.85rem 1.3rem;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:.9rem;font-weight:500;color:#999;white-space:nowrap;position:relative;transition:color .2s;font-family:inherit}
.tab-btn.active{color:#1a1a1a;border-bottom-color:#c9a96e}
.badge{background:#e53e3e;color:#fff;font-size:.65rem;font-weight:800;padding:.15rem .42rem;border-radius:999px;margin-left:.35rem;vertical-align:middle}
.tab-pane{padding:1.5rem;max-width:920px;margin:0 auto}
.pane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.pane-title{font-size:1.25rem;font-weight:700}
.empty-state{text-align:center;padding:3.5rem 1rem;color:#aaa}
.empty-state p:first-child{font-size:1rem;margin-bottom:.4rem}
.empty-state p{font-size:.875rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:9px;border:none;font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-dark{background:#1a1a1a;color:#fff}
.btn-gold{background:#c9a96e;color:#fff}
.btn-outline{background:#fff;border:1.5px solid #e0dbd3;color:#1a1a1a}
.btn-danger{background:#fee2e2;color:#c53030;border:none;padding:.38rem .8rem;border-radius:7px;cursor:pointer;font-size:.8rem;font-family:inherit}
.btn-danger:hover{background:#fecaca}
.btn-wa{background:#25D366;color:#fff;text-decoration:none;padding:.48rem 1rem;border-radius:8px;font-size:.83rem;font-weight:600;display:inline-flex;align-items:center;gap:.4rem;white-space:nowrap}
.btn-wa:hover{opacity:.88}
.icon-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:.3rem;opacity:.5;transition:opacity .2s;font-family:inherit}
.icon-btn:hover{opacity:1}
.masters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem}
.master-card{background:#fff;border-radius:14px;padding:1.2rem 1.2rem 1.2rem 1rem;display:flex;align-items:center;gap:1rem;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.master-avatar{width:54px;height:54px;border-radius:50%;background:#f4f1ee;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0}
.master-name{font-weight:700;font-size:.95rem;margin-bottom:.2rem}
.master-spec{font-size:.78rem;color:#999;line-height:1.5}
.master-card-actions{margin-left:auto;display:flex;gap:.3rem;flex-shrink:0}
.schedule-controls{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.schedule-controls select,.schedule-controls input[type=date]{padding:.65rem 1rem;border:1.5px solid #e0dbd3;border-radius:9px;font-size:.9rem;background:#fff;font-family:inherit;flex:1;min-width:150px;outline:none;transition:border-color .2s}
.schedule-controls select:focus,.schedule-controls input:focus{border-color:#c9a96e}
.slots-section{background:#fff;border-radius:14px;padding:1.4rem;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.slots-section-label{font-size:.78rem;font-weight:700;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:1rem}
.slots-chips{display:flex;flex-wrap:wrap;gap:.6rem;min-height:44px}
.slot-chip{display:inline-flex;align-items:center;gap:.45rem;padding:.4rem .85rem;border-radius:999px;font-size:.875rem;font-weight:600;user-select:none}
.slot-chip.free{background:#d1fae5;color:#065f46}
.slot-chip.booked{background:#fee2e2;color:#c53030}
.slot-chip-meta{font-size:.72rem;font-weight:400;opacity:.75}
.slot-del{background:none;border:none;cursor:pointer;font-size:.75rem;opacity:.55;padding:0;line-height:1;transition:opacity .15s}
.slot-del:hover{opacity:1}
.add-slot-row{display:flex;gap:.75rem;align-items:center;margin-top:1.35rem;flex-wrap:wrap;padding-top:1.2rem;border-top:1px solid #f0ebe5}
.add-slot-row input[type=time]{padding:.65rem 1rem;border:1.5px solid #e0dbd3;border-radius:9px;font-size:.9rem;background:#fff;font-family:inherit;outline:none;transition:border-color .2s}
.add-slot-row input:focus{border-color:#c9a96e}
.slots-no-result{font-size:.85rem;color:#bbb;padding:.5rem 0}
.bookings-list{display:flex;flex-direction:column;gap:.85rem}
.booking-card{background:#fff;border-radius:14px;padding:1.2rem 1.35rem;box-shadow:0 1px 6px rgba(0,0,0,.07);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.booking-card.is-new{border-left:3px solid #c9a96e}
.booking-date{font-size:.78rem;color:#aaa;margin-bottom:.3rem}
.booking-client-name{font-size:1rem;font-weight:700;margin-bottom:.25rem}
.booking-meta{font-size:.85rem;color:#666}
.booking-phone{color:#1a1a1a;font-weight:600;text-decoration:none}
.booking-phone:hover{text-decoration:underline}
.booking-ts{font-size:.72rem;color:#bbb;margin-top:.35rem}
.booking-actions{display:flex;gap:.5rem;align-items:center;flex-shrink:0;flex-wrap:wrap}
.new-dot{display:inline-block;width:7px;height:7px;background:#c9a96e;border-radius:50%;margin-left:.45rem;vertical-align:middle}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:430px;position:relative}
.modal-title{font-size:1.15rem;font-weight:700;margin-bottom:1.5rem}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.4rem;color:#555}
.form-group input,.form-group select{width:100%;padding:.72rem 1rem;border:1.5px solid #e0dbd3;border-radius:9px;font-size:.9rem;font-family:inherit;transition:border-color .2s;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#c9a96e}
.emoji-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
.emoji-opt{font-size:1.5rem;cursor:pointer;padding:.3rem .4rem;border-radius:8px;background:none;border:2px solid transparent;transition:all .15s;line-height:1}
.emoji-opt:hover{background:#f4f1ee}
.emoji-opt.selected{background:#f4f1ee;border-color:#c9a96e}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.75rem}
@media(max-width:560px){.booking-card{flex-direction:column}.booking-actions{width:100%}.pane-header{flex-wrap:wrap;gap:.75rem}.modal-box{padding:1.5rem}}
</style>
</head>
<body>
<div id="loginWrap" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">К<span> Студия</span></div>
    <div class="login-sub">Панель администратора</div>
    <form id="loginForm">
      <input type="password" id="pwdInput" placeholder="Введите пароль" autocomplete="current-password">
      <button type="submit" class="btn-login">Войти →</button>
      <div class="login-err" id="loginErr">Неверный пароль</div>
    </form>
  </div>
</div>
<div id="dashboard" style="display:none">
  <header class="adm-header">
    <span class="adm-logo">К<span> Студия</span> · Админ</span>
    <button class="btn-logout" onclick="logout()">Выйти</button>
  </header>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('masters',this)">Мастера</button>
    <button class="tab-btn" onclick="switchTab('schedule',this)">Расписание</button>
    <button class="tab-btn" id="bookingsTabBtn" onclick="switchTab('bookings',this)">Записи<span class="badge" id="newBadge" style="display:none">0</span></button>
  </div>
  <div id="paneMasters" class="tab-pane">
    <div class="pane-header"><h2 class="pane-title">Мастера</h2><button class="btn btn-dark" onclick="openMasterModal()">+ Добавить мастера</button></div>
    <div id="mastersGrid" class="masters-grid"></div>
  </div>
  <div id="paneSchedule" class="tab-pane" style="display:none">
    <div class="pane-header"><h2 class="pane-title">Расписание</h2></div>
    <div class="schedule-controls">
      <select id="schedMaster" onchange="loadSlots()"></select>
      <input type="date" id="schedDate" onchange="loadSlots()">
    </div>
    <div class="slots-section">
      <div class="slots-section-label">Слоты на выбранный день</div>
      <div id="slotsContainer" class="slots-chips"><span class="slots-no-result">Выберите мастера и дату</span></div>
      <div class="add-slot-row">
        <input type="time" id="newSlotTime" step="1800" placeholder="10:00">
        <button class="btn btn-gold" onclick="addSlot()">+ Добавить слот</button>
      </div>
    </div>
  </div>
  <div id="paneBookings" class="tab-pane" style="display:none">
    <div class="pane-header"><h2 class="pane-title">Записи клиентов</h2></div>
    <div id="bookingsContainer" class="bookings-list"></div>
  </div>
</div>
<div id="masterModal" class="modal-overlay" onclick="if(event.target===this)closeMasterModal()">
  <div class="modal-box">
    <h3 class="modal-title" id="masterModalTitle">Добавить мастера</h3>
    <form id="masterForm" onsubmit="saveMaster(event)">
      <div class="form-group"><label>Имя мастера *</label><input type="text" id="mName" required placeholder="Айгерим"></div>
      <div class="form-group"><label>Специализация</label><input type="text" id="mSpec" placeholder="Маникюр, педикюр"></div>
      <div class="form-group"><label>Аватар</label>
        <div class="emoji-row" id="emojiRow">
          <button type="button" class="emoji-opt selected" onclick="pickEmoji('💅',this)">💅</button>
          <button type="button" class="emoji-opt" onclick="pickEmoji('💆',this)">💆</button>
          <button type="button" class="emoji-opt" onclick="pickEmoji('✂️',this)">✂️</button>
          <button type="button" class="emoji-opt" onclick="pickEmoji('💇',this)">💇</button>
          <button type="button" class="emoji-opt" onclick="pickEmoji('🌸',this)">🌸</button>
          <button type="button" class="emoji-opt" onclick="pickEmoji('💄',this)">💄</button>
          <button type="button" class="emoji-opt" onclick="pickEmoji('🧖',this)">🧖</button>
          <button type="button" class="emoji-opt" onclick="pickEmoji('🌺',this)">🌺</button>
        </div>
        <input type="hidden" id="mEmoji" value="💅">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeMasterModal()">Отмена</button>
        <button type="submit" class="btn btn-dark" id="masterSaveBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>
<script>
const SUPABASE_URL='https://azqnxataowbovezrxapm.supabase.co';
const SUPABASE_KEY='sb_publishable_QcB-6J0EWsEppsSscAKQMQ_KdmYcn3k';
const ADMIN_PASS='kstudio2025';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
let masters=[],editingId=null,newBookingsCount=0;
function init(){if(sessionStorage.getItem('adminOk')==='1')showDashboard();}
document.getElementById('loginForm').onsubmit=e=>{e.preventDefault();if(document.getElementById('pwdInput').value===ADMIN_PASS){sessionStorage.setItem('adminOk','1');showDashboard();}else{const err=document.getElementById('loginErr');err.style.display='block';setTimeout(()=>err.style.display='none',2500);}};
function showDashboard(){document.getElementById('loginWrap').style.display='none';document.getElementById('dashboard').style.display='block';document.getElementById('schedDate').value=todayStr();loadMasters();loadBookings();subscribeBookings();}
function logout(){sessionStorage.removeItem('adminOk');location.reload();}
function switchTab(name,btn){document.querySelectorAll('.tab-pane').forEach(p=>p.style.display='none');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('pane'+cap(name)).style.display='block';btn.classList.add('active');if(name==='schedule'){fillSchedMasters();loadSlots();}if(name==='bookings'){loadBookings();clearBadge();}}
async function loadMasters(){const{data,error}=await sb.from('masters').select('*').order('name');if(error){console.error(error);return;}masters=data||[];renderMasters();}
function renderMasters(){const g=document.getElementById('mastersGrid');if(!masters.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><p>Мастера не добавлены</p><p>Нажмите «+ Добавить мастера» чтобы начать</p></div>';return;}g.innerHTML=masters.map(m=>`<div class="master-card"><div class="master-avatar">${m.emoji||'💅'}</div><div style="flex:1;min-width:0"><div class="master-name">${esc(m.name)}</div><div class="master-spec">${esc(m.specialization||'Без специализации')}</div></div><div class="master-card-actions"><button class="icon-btn" onclick="editMaster('${m.id}')">✏️</button><button class="icon-btn" onclick="deleteMaster('${m.id}','${esc(m.name)}')">🗑️</button></div></div>`).join('');}
function openMasterModal(){editingId=null;document.getElementById('masterModalTitle').textContent='Добавить мастера';document.getElementById('mName').value='';document.getElementById('mSpec').value='';setEmoji('💅');document.getElementById('masterModal').classList.add('open');setTimeout(()=>document.getElementById('mName').focus(),80);}
function editMaster(id){const m=masters.find(x=>x.id===id);if(!m)return;editingId=id;document.getElementById('masterModalTitle').textContent='Редактировать мастера';document.getElementById('mName').value=m.name;document.getElementById('mSpec').value=m.specialization||'';setEmoji(m.emoji||'💅');document.getElementById('masterModal').classList.add('open');}
function closeMasterModal(){document.getElementById('masterModal').classList.remove('open');editingId=null;}
function pickEmoji(e,btn){setEmoji(e);}
function setEmoji(e){document.getElementById('mEmoji').value=e;document.querySelectorAll('.emoji-opt').forEach(b=>{b.classList.toggle('selected',b.textContent.trim()===e);});}
async function saveMaster(ev){ev.preventDefault();const btn=document.getElementById('masterSaveBtn');btn.disabled=true;btn.textContent='Сохранение...';const payload={name:document.getElementById('mName').value.trim(),specialization:document.getElementById('mSpec').value.trim(),emoji:document.getElementById('mEmoji').value};const{error}=editingId?await sb.from('masters').update(payload).eq('id',editingId):await sb.from('masters').insert(payload);btn.disabled=false;btn.textContent='Сохранить';if(error){alert('Ошибка: '+error.message);return;}closeMasterModal();await loadMasters();}
async function deleteMaster(id,name){if(!confirm(`Удалить мастера «${name}»?`))return;await sb.from('masters').delete().eq('id',id);await loadMasters();}
function fillSchedMasters(){const sel=document.getElementById('schedMaster');if(!masters.length){sel.innerHTML='<option>Сначала добавьте мастеров</option>';return;}sel.innerHTML=masters.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');}
async function loadSlots(){const mid=document.getElementById('schedMaster').value;const date=document.getElementById('schedDate').value;const c=document.getElementById('slotsContainer');if(!mid||!date){c.innerHTML='<span class="slots-no-result">Выберите мастера и дату</span>';return;}const{data,error}=await sb.from('time_slots').select('*').eq('master_id',mid).eq('slot_date',date).order('slot_time');if(error){c.innerHTML='<span class="slots-no-result">Ошибка</span>';return;}if(!data||!data.length){c.innerHTML='<span class="slots-no-result">Нет слотов. Добавьте время ниже.</span>';return;}c.innerHTML=data.map(s=>`<span class="slot-chip ${s.is_booked?'booked':'free'}">${s.slot_time.slice(0,5)}${s.is_booked?`<span class="slot-chip-meta">${esc(s.client_name||'')}</span>`:''}<button class="slot-del" onclick="deleteSlot('${s.id}')">✕</button></span>`).join('');}
async function addSlot(){const mid=document.getElementById('schedMaster').value;const date=document.getElementById('schedDate').value;const time=document.getElementById('newSlotTime').value;if(!mid){alert('Выберите мастера');return;}if(!date){alert('Выберите дату');return;}if(!time){alert('Укажите время');return;}const{error}=await sb.from('time_slots').insert({master_id:mid,slot_date:date,slot_time:time+':00'});if(error){if(error.code==='23505')alert('Слот уже есть');else alert('Ошибка: '+error.message);return;}document.getElementById('newSlotTime').value='';await loadSlots();}
async function deleteSlot(id){await sb.from('time_slots').delete().eq('id',id);await loadSlots();}
async function loadBookings(){const{data,error}=await sb.from('time_slots').select('*, masters(name)').eq('is_booked',true).order('slot_date',{ascending:false}).order('slot_time',{ascending:false});const c=document.getElementById('bookingsContainer');if(error){c.innerHTML='<div class="empty-state"><p>Ошибка</p></div>';return;}const bookings=data||[];if(!bookings.length){c.innerHTML='<div class="empty-state"><p>Записей пока нет</p><p>Они появятся когда клиенты запишутся</p></div>';return;}const oneDayAgo=Date.now()-86400000;const recentNew=bookings.filter(b=>new Date(b.booked_at).getTime()>oneDayAgo).length;if(recentNew>0&&document.getElementById('paneBookings').style.display==='none'){updateBadge(recentNew);}c.innerHTML=bookings.map(b=>{const d=new Date(b.slot_date+'T00:00:00');const dayStr=d.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});const time=b.slot_time.slice(0,5);const isNew=new Date(b.booked_at).getTime()>oneDayAgo;const phone=(b.client_phone||'').replace(/\D/g,'');const wa=`https://wa.me/${phone}?text=${encodeURIComponent(`Здравствуйте, ${b.client_name}! Подтверждаем запись в К Студию:\n📅 ${dayStr} в ${time}\n👤 Мастер: ${b.masters?.name||''}`)}`;return`<div class="booking-card${isNew?' is-new':''}"><div style="flex:1;min-width:0"><div class="booking-date">${dayStr} в ${time} · ${b.masters?.name||'—'}${isNew?'<span class="new-dot"></span>':''}</div><div class="booking-client-name">${esc(b.client_name||'—')}</div><div class="booking-meta"><a class="booking-phone" href="tel:${b.client_phone}">${esc(b.client_phone||'')}</a></div><div class="booking-ts">Записался: ${new Date(b.booked_at).toLocaleString('ru-RU')}</div></div><div class="booking-actions"><a href="${wa}" target="_blank" rel="noopener" class="btn-wa">💬 WhatsApp</a><button class="btn-danger" onclick="cancelBooking('${b.id}')">Отменить</button></div></div>`;}).join('');}
async function cancelBooking(id){if(!confirm('Отменить запись?'))return;await sb.from('time_slots').update({is_booked:false,client_name:null,client_phone:null,booked_at:null}).eq('id',id);await loadBookings();}
function subscribeBookings(){sb.channel('admin-rt').on('postgres_changes',{event:'UPDATE',schema:'public',table:'time_slots'},payload=>{if(payload.new&&payload.new.is_booked){if(document.getElementById('paneBookings').style.display==='none'){newBookingsCount++;updateBadge(newBookingsCount);}else{loadBookings();}const orig=document.title;document.title='🔔 Новая запись!';setTimeout(()=>{document.title=orig;},5000);}}).subscribe();}
function updateBadge(n){const b=document.getElementById('newBadge');b.textContent=n;b.style.display='inline';}
function clearBadge(){newBookingsCount=0;document.getElementById('newBadge').style.display='none';}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
</body>
</html>
